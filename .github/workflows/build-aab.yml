name: Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Decode keystore (if configured)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.FINAX_KEYSTORE_BASE64 }}
        run: |
          # Strip any whitespace/newlines that may have been introduced when
          # pasting the secret, then decode. If decoding fails or the secret is
          # missing, fall back to an unsigned build instead of failing the job.
          if [ -n "$KEYSTORE_BASE64" ] && \
             printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > "$RUNNER_TEMP/finax-release.jks" 2>/dev/null && \
             [ -s "$RUNNER_TEMP/finax-release.jks" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Keystore decoded successfully — building a SIGNED release."
          else
            rm -f "$RUNNER_TEMP/finax-release.jks"
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FINAX_KEYSTORE_BASE64 missing or invalid — building an UNSIGNED release AAB. Re-create the secret from finax-keystore-base64.txt to get a signed bundle."
          fi

      - name: Build signed release AAB
        if: steps.keystore.outputs.configured == 'true'
        env:
          FINAX_KEYSTORE_FILE: ${{ runner.temp }}/finax-release.jks
          FINAX_KEYSTORE_PASSWORD: ${{ secrets.FINAX_KEYSTORE_PASSWORD }}
          FINAX_KEY_ALIAS: ${{ secrets.FINAX_KEY_ALIAS }}
          FINAX_KEY_PASSWORD: ${{ secrets.FINAX_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Build unsigned release AAB (no keystore configured)
        if: steps.keystore.outputs.configured == 'false'
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: finax-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Also build debug APK (for quick testing on a phone)
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: finax-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
